# ── Collection settings ────────────────────────────────────────────────
collection:
  posts_per_keyword: 35          # relevance-sorted; cut from 50 after top-N analysis
                                 # (2026-07-04: 76% of gate-kept posts sat at pos <=30,
                                 # decision-rule band 70-85% -> 35; operator-approved)
  # 2026-07-13: FLAG — daily_log shows posts with reject_reason "zero engagement" /
  # "low engagement" reaching the sheet, which shouldn't happen if this is enforced at
  # collection time. Check whether this field is actually wired into the collection
  # code (or whether it's being applied to a different field than post engagement
  # count). Left values unchanged pending that check — see run-4 keyword-only test.
  min_engagement_tier1: 10
  min_engagement_tier2: 10
  min_engagement_tier3: 10
  graph_traversal_enabled: false

# ── Semantic filter ───────────────────────────────────────────────────
filter:
  min_semantic_similarity: 0.35
  blocked_substrings:
    # HR / job announcement noise — mirrors NOT block applied at collection time
    # These catch what slips through (creative phrasing, no hashtag, etc.)
    - "hiring"
    - "we're hiring"
    - "job opening"
    - "job opportunity"
    - "open position"
    - "we are recruiting"
    - "open to work"
    - "open to opportunities"
    - "new role"
    - "new chapter"
    - "new position"
    - "thrilled to announce"
    - "excited to announce"
    - "excited to share"
    - "pleased to announce"
    - "happy to share that I"
    - "I am thrilled"
    - "I'm thrilled"
    - "joining the team"
    - "join our team"
    - "congratulations on your new"
    - "congrats on your new"
    - "promoted to"
    - "after 5 years"                      # catches "after 5 amazing years at..."
    - "after 3 years"
    - "after 10 years"
    - "years at "
    # Education noise (not ICP pain — personal milestones)
    - "internship"
    - "scholarship"
    - "admission"
    - "apply now"
    - "graduation"
    - "graduated from"
    # Spam / policy noise
    - "community guidelines violation"
    - "terms of service"

# ── Scoring ───────────────────────────────────────────────────────────
scoring:
  tier_a_threshold: 0.65
  tier_b_threshold: 0.40
  influencer_follower_threshold: 5000
  min_score_for_signal: 6
  min_comment_target_score: 0.45   # raise for a stricter shortlist, lower for more volume

# ── Action limits ─────────────────────────────────────────────────────
action_limits:
  connections_per_day: 20
  comments_per_day: 30
  visits_per_day: 25
  reposts_per_week: 2

