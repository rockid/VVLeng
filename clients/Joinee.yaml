# ── Niche definition (fill with your product details) ──────────────────
niche:
  product_description: "Community Management Platform SaaS. Helps businesses and organizations turn their existing customer/member base into active, engaged communities. Started in university alumni engagement; now serving online education platforms, business accelerators, incubators, entrepreneurial networks, SME-focused banks and fintechs, and any business that benefits from organizing customers into a sticky community layer."

  primary_use_case: "Turning passive customer bases into active, self-sustaining communities"

  expanding_use_cases:
    - "Online course and cohort-based education community retention"
    - "Startup accelerator and incubator alumni/portfolio network management"
    - "Entrepreneurial community building and peer networking"
    - "SME bank and fintech customer community engagement"
    - "Professional association and trade body member engagement"
    - "Corporate alumni and talent community management"
    - "Subscription business churn reduction via community"
    - "Brand community building for B2B SaaS companies"

  target_audience:
    - "Online education founders and community managers (Cohort-based courses, bootcamps)"
    - "Accelerator and incubator program directors"
    - "Entrepreneurial community leads and ecosystem builders"
    - "SME bank heads of customer engagement and retention"
    - "Fintech community and growth managers"
    - "B2B SaaS customer success and community teams"
    - "Professional association executives"
    - "University alumni relations teams"

  pain_vocabulary:
    - "community churn"
    - "low member engagement"
    - "ghost community"
    - "passive subscribers"
    - "dead Slack group"
    - "low cohort retention"
    - "students disappearing after graduation"
    - "alumni going dark"
    - "no network effect"
    - "community doesn't retain"
    - "members don't show up"
    - "customer loyalty gap"
    - "low lifetime value"
    - "one-and-done customers"
    - "transactional relationships"
    - "community ROI hard to prove"
    - "volunteer burnout"
    - "manual community management"

